<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST NIVEL DIOS — Tema 4: La Unión Europea</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@700;800&display=swap');

  :root {
    --bg: #f7f5ff;
    --card: #ffffff;
    --accent1: #b8a9f8;
    --accent2: #fbc4ab;
    --accent3: #a8d8b9;
    --accent4: #fde68a;
    --accent5: #f9a8d4;
    --txt: #2d2640;
    --txt-light: #7c6f9a;
    --correct-bg: #d1fae5;
    --correct-border: #34d399;
    --wrong-bg: #ffe4e6;
    --wrong-border: #f87171;
    --selected-bg: #ede9fe;
    --selected-border: #7c3aed;
    --progress-h: 6px;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(100,70,200,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--txt);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: linear-gradient(135deg, #c4b5fd 0%, #fbcfe8 50%, #a5f3c0 100%);
    padding: 28px 24px 22px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(120,80,220,0.12);
  }
  header h1 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 800;
    color: #3b0764;
    letter-spacing: -0.5px;
  }
  header p.subtitle {
    font-size: 0.78rem;
    color: #6b21a8;
    margin-top: 2px;
    font-weight: 500;
  }

  #progress-wrap {
    background: rgba(255,255,255,0.6);
    padding: 10px 24px 6px;
    position: sticky;
    top: 78px;
    z-index: 99;
  }
  #progress-bar-outer {
    background: #e9e3ff;
    border-radius: 99px;
    height: var(--progress-h);
    overflow: hidden;
    width: 100%;
  }
  #progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #7c3aed, #ec4899);
    border-radius: 99px;
    transition: width 0.5s ease;
    width: 0%;
  }
  #progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--txt-light);
    margin-top: 4px;
    font-weight: 500;
  }
  #score-display {
    font-size: 0.7rem;
    color: #7c3aed;
    font-weight: 700;
  }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  .category-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .question-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 24px 20px;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--txt-light);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: clamp(0.92rem, 2.5vw, 1.05rem);
    font-weight: 600;
    line-height: 1.55;
    color: var(--txt);
    margin-bottom: 20px;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    list-style: none;
  }

  .option-btn {
    width: 100%;
    text-align: left;
    padding: 13px 16px;
    border-radius: 12px;
    border: 2px solid #e8e0ff;
    background: #faf8ff;
    cursor: pointer;
    font-size: 0.88rem;
    font-family: 'Inter', sans-serif;
    color: var(--txt);
    line-height: 1.45;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent1);
    background: var(--selected-bg);
    transform: translateX(2px);
  }
  .option-letter {
    min-width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #ede9fe;
    color: #6d28d9;
    font-weight: 700;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .option-btn.correct { border-color: var(--correct-border); background: var(--correct-bg); }
  .option-btn.correct .option-letter { background: #34d399; color: #fff; }
  .option-btn.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }
  .option-btn.wrong .option-letter { background: #f87171; color: #fff; }
  .option-btn:disabled { cursor: default; }

  .explanation {
    margin-top: 16px;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.82rem;
    line-height: 1.55;
    display: none;
    border-left: 4px solid;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  .explanation.correct-exp { background: #ecfdf5; border-color: #34d399; color: #065f46; }
  .explanation.wrong-exp { background: #fff1f2; border-color: #f87171; color: #9f1239; }
  .explanation strong { font-weight: 700; }

  #next-btn {
    display: none;
    margin-top: 18px;
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #db2777);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.3px;
  }
  #next-btn:hover { opacity: 0.88; }

  #results-screen {
    display: none;
    text-align: center;
    padding: 20px 16px 60px;
    max-width: 600px;
    margin: 0 auto;
    animation: slideIn 0.4s ease;
  }
  .results-trophy { font-size: 4rem; margin-bottom: 12px; }
  .results-title {
    font-family: 'Sora', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: #3b0764;
    margin-bottom: 8px;
  }
  .results-score {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 12px 0;
  }
  .results-detail { font-size: 0.88rem; color: var(--txt-light); margin-bottom: 28px; line-height: 1.6; }
  .results-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 28px; }
  .result-stat { background: var(--card); border-radius: var(--radius); padding: 16px 12px; box-shadow: var(--shadow); }
  .result-stat .stat-num { font-family: 'Sora', sans-serif; font-size: 1.6rem; font-weight: 800; }
  .result-stat .stat-lbl { font-size: 0.72rem; color: var(--txt-light); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .results-msg { background: linear-gradient(135deg, #ede9fe, #fce7f3); border-radius: var(--radius); padding: 16px 20px; font-size: 0.85rem; color: #4c1d95; font-weight: 500; margin-bottom: 24px; line-height: 1.55; }
  #restart-btn { padding: 14px 36px; border-radius: 14px; border: none; background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
  #restart-btn:hover { opacity: 0.88; }

  .cat-tratados   { background: #ede9fe; color: #5b21b6; }
  .cat-inst       { background: #fce7f3; color: #9d174d; }
  .cat-derecho    { background: #d1fae5; color: #065f46; }
  .cat-paises     { background: #fef3c7; color: #92400e; }
  .cat-agencias   { background: #e0f2fe; color: #0c4a6e; }
  .cat-schengen   { background: #f3e8ff; color: #6b21a8; }
  .cat-misc       { background: #fff1f2; color: #9f1239; }
</style>
</head>
<body>

<header>
  <h1>⚡ TEST NIVEL DIOS — Tema 4: La Unión Europea</h1>
  <p class="subtitle">Escala Básica CNP · Distractores = respuestas correctas de otras preguntas</p>
</header>

<div id="progress-wrap">
  <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
  <div id="progress-label">
    <span id="q-counter">Pregunta 1 / <span id="total-q">?</span></span>
    <span id="score-display">✓ 0 &nbsp;✗ 0</span>
  </div>
</div>

<main>
  <div id="quiz-area">
    <span class="category-badge" id="cat-badge"></span>
    <div class="question-card">
      <div class="q-number" id="q-num-label"></div>
      <div class="q-text" id="q-text"></div>
      <ul class="options-list" id="options-list"></ul>
      <div class="explanation" id="explanation"></div>
      <button id="next-btn">Siguiente pregunta →</button>
    </div>
  </div>

  <div id="results-screen">
    <div class="results-trophy" id="trophy-emoji">🏆</div>
    <div class="results-title" id="results-title">¡Test completado!</div>
    <div class="results-score" id="results-score"></div>
    <div class="results-detail" id="results-detail"></div>
    <div class="results-grid">
      <div class="result-stat"><div class="stat-num" style="color:#34d399" id="stat-correct">0</div><div class="stat-lbl">Correctas</div></div>
      <div class="result-stat"><div class="stat-num" style="color:#f87171" id="stat-wrong">0</div><div class="stat-lbl">Incorrectas</div></div>
      <div class="result-stat"><div class="stat-num" style="color:#7c3aed" id="stat-total">0</div><div class="stat-lbl">Total preguntas</div></div>
      <div class="result-stat"><div class="stat-num" style="color:#db2777" id="stat-pct">0%</div><div class="stat-lbl">Precisión</div></div>
    </div>
    <div class="results-msg" id="results-msg"></div>
    <button id="restart-btn" onclick="startQuiz()">🔄 Repetir test</button>
  </div>
</main>

<script>
const PREGUNTAS = [

// ── BLOQUE 1: TRATADOS ─────────────────────────────────────────────
{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿En qué fecha entró en vigor el Tratado de París (CECA)?",
 opts:["23/07/1952","01/01/1958","01/07/1967"],correct:0,
 exp:"El Tratado de París se <strong>firmó el 18/04/1951</strong> y entró en vigor el <strong>23/07/1952</strong>. El 01/01/1958 corresponde al Tratado de Roma y el 01/07/1967 al Tratado de Fusión."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"El Tratado de Roma (1957) creó la CEE y además la Comunidad Europea de la Energía Atómica. ¿Cómo se abrevia esta segunda?",
 opts:["EURATOM","CECA","CAAS"],correct:0,
 exp:"<strong>EURATOM</strong> (Comunidad Europea de la Energía Atómica) fue creada por el Tratado de Roma en 1957. La CECA ya existía desde 1951 y el CAAS es el Convenio de Aplicación del Acuerdo Schengen."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Cuál fue el objetivo principal del Tratado de Bruselas / Tratado de Fusión (1965)?",
 opts:["Fusionar las instituciones ejecutivas de CECA, CEE y EURATOM en un único Consejo y Comisión","Crear el mercado interior con libre circulación de personas","Establecer los tres pilares de la UE"],correct:0,
 exp:"El Tratado de Fusión <strong>unificó los ejecutivos</strong> de las tres Comunidades en una sola Comisión y un solo Consejo. El mercado interior se consolidó en el Acta Única y los tres pilares son de Maastricht."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Qué reforma introdujo el Acta Única Europea (1986) en relación con el Parlamento Europeo?",
 opts:["Oficializó el nombre 'Parlamento Europeo' e introdujo los procedimientos de dictamen conforme y cooperación","Le otorgó el derecho de aprobación del Presidente de la Comisión","Equiparó sus poderes legislativos con los del Consejo"],correct:0,
 exp:"El Acta Única hizo oficial el nombre <strong>'Parlamento Europeo'</strong> e introdujo los procedimientos de <strong>dictamen conforme y cooperación</strong>. La aprobación del Presidente la otorgó Ámsterdam y la equiparación de poderes corresponde a Lisboa."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"El Tratado de Maastricht estructuró la UE en tres pilares. ¿Cuál era el contenido del 3.er pilar?",
 opts:["Cooperación en Justicia y Asuntos de Interior (JAI), incluida la creación de Europol","Política Exterior y Seguridad Común (PESC)","Comunidades Europeas, mercado único y unión económica y monetaria"],correct:0,
 exp:"El <strong>3.er pilar</strong> era la <strong>Cooperación en JAI</strong>: fronteras, terrorismo, tráfico de drogas, inmigración irregular y la <strong>creación de Europol</strong>. El 2.º era la PESC y el 1.º las Comunidades Europeas."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Qué requisito político exigen los criterios de Copenhague (1993) para la adhesión a la UE?",
 opts:["Gobiernos democráticos instaurados","Economía de mercado viable","Instituciones eficaces para cumplir el acervo comunitario"],correct:0,
 exp:"El <strong>criterio político</strong> de Copenhague exige <strong>democracia, Estado de derecho y respeto de los derechos humanos</strong>. El económico pide economía de mercado viable y el de acervo, capacidad de aplicar el derecho de la UE."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Qué cargo clave en política exterior creó el Tratado de Ámsterdam (1997)?",
 opts:["Alto Representante de Política Exterior y Seguridad Común (Mr. PESC)","Presidente del Consejo Europeo","Servicio Europeo de Acción Exterior (SEAE)"],correct:0,
 exp:"Ámsterdam creó el cargo de <strong>Alto Representante PESC</strong>. El Presidente permanente del Consejo Europeo y el SEAE fueron creados por Lisboa."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Cuántos Estados miembros mínimos se necesitan para establecer una cooperación reforzada?",
 opts:["9 países","7 países","5 países"],correct:0,
 exp:"El mínimo es de <strong>9 países</strong>. El número 7 aparece en la Iniciativa Ciudadana Europea (ICE) y en otras reglas de representación, pero no en la cooperación reforzada."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Por qué fracasó el Tratado Constitucional de 2004?",
 opts:["Francia y Países Bajos lo rechazaron en referéndum","El Consejo Europeo no lo aprobó por unanimidad","España y Portugal lo vetaron en el Consejo"],correct:0,
 exp:"El Tratado Constitucional fue ratificado por la mayoría de los EM, pero <strong>Francia y Países Bajos lo rechazaron en referéndum</strong> (2005), por lo que nunca entró en vigor."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Cómo pasó a denominarse la codecisión con el Tratado de Lisboa?",
 opts:["Procedimiento legislativo ordinario","Procedimiento especial de consulta","Dictamen conforme reforzado"],correct:0,
 exp:"Lisboa rebautizó la <strong>codecisión</strong> como <strong>procedimiento legislativo ordinario</strong>, ampliándola a nuevos ámbitos y equiparando los poderes del PE con los del Consejo."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Cuántas firmas y condiciones exige la Iniciativa Ciudadana Europea (ICE)?",
 opts:["1 millón de firmas en al menos 7 EM, impulsada por al menos 7 ciudadanos de 7 EM","500.000 firmas en al menos 5 EM","2 millones de firmas en al menos 14 EM"],correct:0,
 exp:"La <strong>ICE</strong> requiere un grupo de al menos <strong>7 ciudadanos de 7 EM</strong> diferentes y recoger <strong>1 millón de firmas</strong> en al menos 7 EM."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"Según el art. 50 TUE (cláusula de retirada), ¿cuánto tiempo tienen los Tratados para dejar de aplicarse si no hay acuerdo?",
 opts:["2 años desde la notificación al Consejo Europeo","1 año desde la ratificación del acuerdo","4 años desde el referéndum de salida"],correct:0,
 exp:"El art. 50 TUE establece <strong>2 años desde la notificación</strong> al Consejo Europeo, salvo que entre antes en vigor el acuerdo de retirada o que el Consejo Europeo decida por unanimidad prorrogar el plazo."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Qué tratado incorporó el Acuerdo de Schengen al acervo de la UE?",
 opts:["El Tratado de Ámsterdam","El Tratado de Maastricht","El Tratado de Lisboa"],correct:0,
 exp:"Fue el <strong>Tratado de Ámsterdam</strong> (en vigor 01/05/1999) el que incorporó Schengen al acervo comunitario."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Qué institución formalizó jurídicamente el Tratado de Maastricht junto con el Tribunal de Cuentas?",
 opts:["El Consejo Europeo","El Banco Central Europeo","El Parlamento Europeo"],correct:0,
 exp:"Maastricht <strong>institucionalizó el Consejo Europeo</strong> e institucional izó también el <strong>Tribunal de Cuentas</strong>. El BCE fue creado por Maastricht pero institucionalizado formalmente por Lisboa."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Cuándo entraron en vigor el Tratado de Roma y el Tratado de Ámsterdam respectivamente?",
 opts:["01/01/1958 y 01/05/1999","23/07/1952 y 01/11/1993","01/07/1987 y 01/02/2003"],correct:0,
 exp:"El Tratado de Roma entró en vigor el <strong>01/01/1958</strong>. El Tratado de Ámsterdam lo hizo el <strong>01/05/1999</strong>. La CECA es de 23/07/1952 y Maastricht de 01/11/1993."},

{cat:"cat-tratados",catLabel:"Tratados Fundacionales",
 q:"¿Cuándo entró en vigor el Tratado de Lisboa y cuándo el Tratado de Niza?",
 opts:["Lisboa: 01/12/2009; Niza: 01/02/2003","Lisboa: 01/01/2010; Niza: 01/01/2004","Lisboa: 01/07/2009; Niza: 01/05/2004"],correct:0,
 exp:"El Tratado de <strong>Niza</strong> entró en vigor el <strong>01/02/2003</strong> y el de <strong>Lisboa</strong> el <strong>01/12/2009</strong>."},

// ── BLOQUE 2: INSTITUCIONES ─────────────────────────────────────────
{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Cuál es la excepción a la presidencia rotatoria del Consejo de la UE?",
 opts:["El Consejo de Asuntos Exteriores, presidido siempre por el Alto Representante (AR)","El Consejo Económico y Financiero (ECOFIN), presidido por la presidencia rotatoria","El Consejo de Justicia e Interior (JAI), presidido por la Comisión"],correct:0,
 exp:"De las 10 formaciones del Consejo, la presidencia rotatoria preside todas EXCEPTO el <strong>Consejo de Asuntos Exteriores</strong>, que preside siempre el <strong>Alto Representante</strong>."},

{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Cuál es la mayoría necesaria para adoptar decisiones ordinarias en el Consejo de la UE?",
 opts:["Doble mayoría cualificada: 55% de los EM que representen el 65% de la población","Mayoría simple de los 27 EM","Unanimidad de todos los EM"],correct:0,
 exp:"Las decisiones ordinarias requieren <strong>doble mayoría cualificada</strong>: al menos el <strong>55% de los EM</strong> (mínimo 15) que representen al menos el <strong>65% de la población</strong>."},

{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Qué función cumple el COREPER II y con qué grupo de trabajo está asistido?",
 opts:["Prepara los asuntos políticos e institucionales; asistido por el grupo ANTICI","Prepara los asuntos técnicos y sectoriales; asistido por el grupo MERTENS","Coordina la cooperación en seguridad interior (COSI)"],correct:0,
 exp:"El <strong>COREPER II</strong> trata los asuntos <strong>políticos e institucionales</strong> y está asistido por el grupo <strong>ANTICI</strong>. El COREPER I gestiona los técnicos con el grupo MERTENS."},

{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Quién preside el Consejo Europeo y cuánto dura su mandato?",
 opts:["Antonio Costa; 2,5 años renovables una vez, elegido por mayoría cualificada","Ursula von der Leyen; 5 años, elegida por el PE","Roberta Metsola; 2,5 años renovables"],correct:0,
 exp:"El Consejo Europeo está presidido por <strong>Antonio Costa</strong>, elegido por <strong>mayoría cualificada</strong> para <strong>2,5 años renovables una vez</strong>."},

{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Con qué quórum se reúne el Consejo Europeo?",
 opts:["2/3 de sus miembros","1/3 de sus miembros","Mayoría absoluta de sus miembros"],correct:0,
 exp:"El Consejo Europeo opera con quórum de <strong>2/3</strong> de sus miembros. El quórum de 1/3 corresponde al Parlamento Europeo."},

{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Cómo se estructura internamente la Comisión Europea?",
 opts:["1 Presidente + 6 Vicepresidentes (5 ejecutivos + el AR) + 20 comisarios = Colegio de 27","1 Presidente + 5 Vicepresidentes + 21 comisarios","1 Presidente + 8 Vicepresidentes + 18 comisarios"],correct:0,
 exp:"La Comisión es un <strong>Colegio de 27</strong>: 1 Presidente (<strong>Ursula von der Leyen</strong>), <strong>6 Vicepresidentes</strong> (5 ejecutivos + el AR como Vicepresidenta) y 20 comisarios."},

{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Cuántos eurodiputados tiene el Parlamento Europeo y cuántos corresponden a España?",
 opts:["719-720 en total; 61 de España","750 en total; 59 de España","705 en total; 54 de España"],correct:0,
 exp:"El PE cuenta con <strong>719-720 eurodiputados</strong> (máximo legal 750 sin el Presidente), con <strong>61 escaños</strong> para España."},

{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Qué mayoría necesita el PE para aprobar una moción de censura contra la Comisión?",
 opts:["2/3 de los votos emitidos que representen la mayoría de los miembros del PE","Mayoría absoluta de los miembros","Mayoría simple de los votos emitidos"],correct:0,
 exp:"La moción de censura requiere <strong>2/3 de los votos emitidos</strong> que representen también la <strong>mayoría de los miembros</strong> del PE."},

{cat:"cat-inst",catLabel:"Instituciones UE",
 q:"¿Cuántos grupos políticos tiene el PE y cuántos eurodiputados se necesitan mínimo para formar uno?",
 opts:["8 grupos; mínimo 23 eurodiputados de al menos 1/4 de los EM","6 grupos; mínimo 30 eurodiputados","10 grupos; mínimo 15 eurodiputados"],correct:0,

// ── FUNCIONES ─────────────────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let questions = [];
let current = 0;
let score = 0;
let wrong = 0;

function startQuiz() {
  questions = shuffle([...PREGUNTAS]);
  questions = questions.map(q => {
    const correctText = q.opts[q.correct];
    const shuffled = shuffle([...q.opts]);
    return { ...q, opts: shuffled, correct: shuffled.indexOf(correctText) };
  });
  current = 0; score = 0; wrong = 0;
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const total = questions.length;
  const pct = (current / total) * 100;
  document.getElementById('progress-bar-inner').style.width = pct + '%';
  document.getElementById('q-counter').innerHTML = `Pregunta ${current + 1} / ${total}`;
  document.getElementById('score-display').innerHTML = `✓ ${score} &nbsp;✗ ${wrong}`;

  const badge = document.getElementById('cat-badge');
  badge.className = 'category-badge ' + q.cat;
  badge.textContent = q.catLabel;

  document.getElementById('q-num-label').textContent = `Pregunta ${current + 1} de ${total}`;
  document.getElementById('q-text').textContent = q.q;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const letters = ['A','B','C'];
  q.opts.forEach((opt, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => selectOption(i, btn));
    li.appendChild(btn);
    list.appendChild(li);
  });

  const exp = document.getElementById('explanation');
  exp.style.display = 'none';
  exp.innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';
}

function selectOption(idx, btn) {
  const q = questions[current];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  const exp = document.getElementById('explanation');
  const nextBtn = document.getElementById('next-btn');

  if (idx === q.correct) {
    btn.classList.add('correct');
    score++;
    exp.className = 'explanation correct-exp';
    exp.innerHTML = '✅ <strong>¡Correcto!</strong> ' + q.exp;
  } else {
    btn.classList.add('wrong');
    allBtns[q.correct].classList.add('correct');
    wrong++;
    exp.className = 'explanation wrong-exp';
    exp.innerHTML = '❌ <strong>Incorrecto.</strong> ' + q.exp;
  }

  document.getElementById('score-display').innerHTML = `✓ ${score} &nbsp;✗ ${wrong}`;
  exp.style.display = 'block';
  nextBtn.style.display = 'block';
  nextBtn.textContent = current + 1 < questions.length ? 'Siguiente pregunta →' : 'Ver resultados →';
}

document.getElementById('next-btn').addEventListener('click', () => {
  current++;
  if (current < questions.length) renderQuestion();
  else showResults();
});

function showResults() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('results-score').textContent = pct + '%';
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent = pct + '%';

  let trophy, title, msg;
  if (pct === 100) {
    trophy = '🏆'; title = '¡NIVEL DIOS ALCANZADO!';
    msg = 'Perfecto absoluto. Has demostrado dominar al 100% el Tema 4. Puedes ir al examen CNP con total seguridad.';
  } else if (pct >= 90) {
    trophy = '🥇'; title = '¡Excelente dominio!';
    msg = `${pct}% de precisión. Rozas el nivel dios. Repasa los errores y repite el test para alcanzar la perfección.`;
  } else if (pct >= 75) {
    trophy = '🥈'; title = 'Buen nivel';
    msg = `${pct}%. Sólido, pero el examen CNP exige precisión quirúrgica. Repasa especialmente los bloques donde fallaste.`;
  } else if (pct >= 60) {
    trophy = '🥉'; title = 'Base correcta, pero insuficiente';
    msg = `${pct}%. Necesitas consolidar la teoría antes del examen. Vuelve a los apuntes y repite el test.`;
  } else {
    trophy = '📚'; title = 'Más estudio necesario';
    msg = `${pct}%. El nivel dios está lejos todavía. Estudia el tema en profundidad y vuelve a intentarlo.`;
  }

  document.getElementById('trophy-emoji').textContent = trophy;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-msg').textContent = msg;
  document.getElementById('results-detail').textContent =
    `Has respondido ${total} preguntas cubriendo el 100% de la teoría del Tema 4.`;
}

startQuiz();
</script>
